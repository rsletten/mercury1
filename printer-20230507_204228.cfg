[include mainsail.cfg]
[virtual_sdcard]
path: /home/biqu/printer_data/gcodes
on_error_gcode: CANCEL_PRINT

[mcu]
canbus_uuid:b04d5daeeca6

[mcu EBBCan]
canbus_uuid:ed5f654430cb

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 15
max_z_accel: 350

### Extruder Motor ###
[extruder]
step_pin: EBBCan: PD0
dir_pin: !EBBCan: PD1
enable_pin: !EBBCan: PD2
microsteps: 16
rotation_distance: 33.500
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan: PB13
sensor_type: EPCOS 100K B57560G104F
sensor_pin: EBBCan: PA3
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 260

[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.5

### Motor 1 ###
[stepper_x]
step_pin: PE2
dir_pin: !PB4
enable_pin: !PC11
microsteps: 16
rotation_distance: 40
full_steps_per_rotation:200 
endstop_pin: EBBCan:PB6
position_endstop: 350
position_max: 350
position_min: 0
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC10
diag_pin: PF3
run_current: 0.800

### Motor 2 ###
[stepper_y]
step_pin: PF12
dir_pin: !PF11
enable_pin: !PB3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PF4
position_endstop: 350
position_max: 350
full_steps_per_rotation:200
position_min: 0
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PF13
diag_pin: PF4
run_current: 0.800

### Motor 3 ###
[stepper_z]
step_pin: PD7
dir_pin: !PD6
enable_pin: !PF10
microsteps: 16
rotation_distance: 4
endstop_pin: probe:z_virtual_endstop
position_max: 400
position_min: -2.2

[tmc2209 stepper_z]
uart_pin: PF9
diag_pin: PF5
run_current: 0.650
stealthchop_threshold: 999999

### Motor 4 ###
[stepper_z1]
step_pin: PD3
dir_pin: !PD2
enable_pin: !PD5
microsteps: 16
rotation_distance: 4

[tmc2209 stepper_z1]
uart_pin: PD4
diag_pin: PC0
run_current: 0.650
stealthchop_threshold: 999999

### BLTouch, Homing, and Bed Mesh
[bltouch]
sensor_pin: ^EBBCan:PB8
control_pin: EBBCan:PB9
z_offset: 0
x_offset: -16
y_offset: -2

[safe_z_home]
home_xy_position: 180, 180
speed: 100
z_hop: 10
z_hop_speed: 5

[bed_mesh]
algorithm: bicubic
speed: 150
horizontal_move_z: 10
mesh_min: 40,40
mesh_max: 320,320
probe_count: 5,5
fade_end: 10
mesh_pps: 2,2
fade_start: 1
fade_target: 0

[z_tilt]
z_positions: 382, 180
    -22,180
points: 335, 180
    32,180
speed: 200
horizontal_move_z: 10
retries: 20
retry_tolerance:0.010

### Heater Bed ###
[heater_bed]
heater_pin: PB5
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA0 # TB
control: pid
pid_Kp: 690.34
pid_Ki: 111.47
pid_Kd: 1068.83
min_temp: 0
max_temp: 130

###  Part Cooling Fan - FAN0 ###
[fan]
pin: EBBCan: PA1

### Hotend Fan - FAN1 ###
[heater_fan hotend_fan]
pin: EBBCan: PA0

### Temperatures ###
[temperature_sensor EBBCan]
sensor_type: temperature_mcu
sensor_mcu: EBBCan
min_temp: 0
max_temp: 100

[temperature_sensor CB1]
sensor_type: temperature_host
 
[temperature_sensor MantaM8P]
sensor_type: temperature_mcu

### ADXL345 ###
[adxl345]
cs_pin: EBBCan: PB12
spi_software_sclk_pin: EBBCan: PB10
spi_software_mosi_pin: EBBCan: PB11
spi_software_miso_pin: EBBCan: PB2
axes_map: x,y,z

[resonance_tester]
accel_chip: adxl345
probe_points: 175,175,20  # an example for a 350mm printer

